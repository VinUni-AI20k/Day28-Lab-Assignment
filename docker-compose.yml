# docker-compose.yml
version: "3.9"

services:
  # ── Kafka Stack ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── Prefect ───────────────────────────────────────────────
  prefect-orion:
    image: prefecthq/prefect:2.14.0-python3.10
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_URL: http://0.0.0.0:4200/api
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

  prefect-worker:
    image: prefecthq/prefect:2.14.0-python3.10
    command:
      - sh
      - -c
      - "prefect work-pool create --type process default-process 2>/dev/null || true; prefect worker start --pool default-process --name lab28-worker"
    environment:
      PREFECT_API_URL: http://prefect-orion:4200/api
    volumes:
      - ./prefect/flows:/opt/prefect/flows
      - ./delta-lake:/opt/delta-lake
    depends_on: [prefect-orion, kafka]

  # ── Vector Store (Qdrant) ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Feature Store (Feast via Redis) ──────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Monitoring Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards

  # ── Mock vLLM (local fallback, replaces Kaggle GPU vLLM) ──
  mock-vllm:
    build: ./mock-vllm
    ports:
      - "8001:8001"

  # ── Embedding Service (local CPU, replaces Kaggle embed) ─
  embed-service:
    build: ./embed-service
    ports:
      - "8002:8002"

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      VLLM_URL: ${VLLM_NGROK_URL:-http://mock-vllm:8001}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-lab28-platform}
    depends_on: [qdrant, redis, mock-vllm]

volumes:
  prefect_data:
  qdrant_data:
